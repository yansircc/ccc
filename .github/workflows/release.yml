name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/ccc-darwin-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/ccc-darwin-amd64 .
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/ccc-linux-amd64  .
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/ccc-linux-arm64  .
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
